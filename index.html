<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex One-Button Call</title>
    <script src="https://unpkg.com/webex@^1/umd/webex.min.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .call-card {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #btnCall {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
            transition: transform 0.2s, background 0.2s;
        }
        #btnCall:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        #btnCall.active {
            background: #ff3b6b;
        }
        #status {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="call-card">
        <h2 id="displayTitle">Webex Calling</h2>
        <button id="btnCall" onclick="handleAction()">CONECTAR</button>
        <p id="status">Esperando inicialización...</p>
    </div>

    <script>
        // CONFIGURACIÓN - RELLENA ESTO
        const ACCESS_TOKEN = 'MjdkNTA4OWYtMjAzZi00Nzk0LWI4NzgtY2ZlMGE4Yzc5YTFmYThlYTkwNjctMmM5_P0A1_cbbe27d4-1f60-43cb-819b-fd3749c66621'; 
        const DESTINO = '6100;

        let webex;
        let activeCall = null;
        const btn = document.getElementById('btnCall');
        const statusTxt = document.getElementById('status');

        // 1. Inicializar Webex al cargar la página
        window.onload = async () => {
            try {
                statusTxt.innerText = "Cargando SDK...";
                // El SDK se registra globalmente como 'webex' (minúsculas) o 'Webex'
                webex = Webex.init({
                    credentials: { access_token: ACCESS_TOKEN }
                });

                await webex.internal.device.register();
                await webex.phone.register();

                statusTxt.innerText = "Listo para llamar";
                btn.innerText = "LLAMAR";
                btn.disabled = false;
            } catch (err) {
                console.error(err);
                statusTxt.innerText = "Error: Verifica tu Token";
            }
        };

        // 2. Manejar Click (Llamar o Colgar)
        async function handleAction() {
            if (!activeCall) {
                makeCall();
            } else {
                hangup();
            }
        }

        function makeCall() {
            statusTxt.innerText = "Marcando...";
            activeCall = webex.phone.dial(DESTINO);

            activeCall.on('connected', () => {
                statusTxt.innerText = "En llamada";
                btn.innerText = "COLGAR";
                btn.classList.add('active');
            });

            activeCall.on('disconnected', () => {
                cleanup();
            });

            activeCall.on('error', (err) => {
                console.error(err);
                statusTxt.innerText = "Error en la llamada";
                cleanup();
            });
        }

        function hangup() {
            if (activeCall) {
                activeCall.hangup();
            }
        }

        function cleanup() {
            activeCall = null;
            statusTxt.innerText = "Llamada finalizada";
            btn.innerText = "LLAMAR";
            btn.classList.remove('active');
        }
    </script>
</body>
</html>
