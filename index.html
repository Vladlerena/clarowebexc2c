<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Webex Click to Call Fix</title>
    <script src="webex.min.js"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px; font-family:sans-serif;">
        <h2>Webex Calling</h2>
        <input type="password" id="token" placeholder="Pega tu Token aquí" style="width:300px; padding:10px;"><br><br>
        <input type="text" id="destino" placeholder="Número: ej +5411..." style="width:300px; padding:10px;"><br><br>
        
        <button id="btnAction" onclick="iniciarProceso()" style="padding:15px 30px; cursor:pointer; background:#00d4ff; border:none; border-radius:5px; font-weight:bold;">
            CONECTAR Y LLAMAR
        </button>
        
        <p id="status" style="color:#666; margin-top:20px;">Estado: Esperando...</p>
    </div>

    <script>
        let webexInstance = null;

        async function iniciarProceso() {
            const token = document.getElementById('token').value.trim();
            const destino = document.getElementById('destino').value.trim();
            const status = document.getElementById('status');

            if (!token || !destino) {
                alert("Completa los campos");
                return;
            }

            try {
                status.innerText = "Iniciando SDK...";

                // 1. Inicialización (Uso de 'Webex' con mayúscula es el estándar del SDK global)
                webexInstance = Webex.init({
                    credentials: { access_token: token }
                });

                status.innerText = "Registrando dispositivo...";
                
                // 2. IMPORTANTE: El error 'reading register' ocurre aquí si no se usa la ruta correcta.
                // En versiones modernas es directamente webex.internal.device.register()
                await webexInstance.internal.device.register();
                
                status.innerText = "Registrando servicio de voz...";
                await webexInstance.phone.register();

                status.innerText = "Marcando...";
                const call = webexInstance.phone.dial(destino);

                call.on('connected', () => {
                    status.innerText = "¡EN LLAMADA!";
                    status.style.color = "green";
                });

                call.on('disconnected', () => {
                    status.innerText = "Llamada finalizada";
                    status.style.color = "#666";
                });

                call.on('error', (err) => {
                    status.innerText = "Error en llamada: " + err.message;
                });

            } catch (error) {
                console.error(error);
                status.innerText = "Error: " + error.message;
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
