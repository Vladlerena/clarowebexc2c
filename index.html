<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Claro Webex C2C - Anexo 6100</title>
    <script src="webex.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 360px; }
        #status { background: #f8f9fa; border: 1px solid #e9ecef; padding: 12px; margin: 20px 0; border-radius: 8px; font-size: 14px; color: #495057; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        .btn-call { width: 100%; padding: 16px; background: #3278a0; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-call:hover { background: #286080; }
        .btn-call:disabled { background: #adb5bd; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Anexo AA 6100</h2>
    <div id="status">Estado: Listo para conectar</div>
    
    <input type="password" id="tokenInput" placeholder="Pega el Access Token aquí">
    
    <button id="btnCall" onclick="handleAction()" class="btn-call">LLAMAR AL 6100</button>
</div>

<script>
    let webex;
    let activeCall;

    async function handleAction() {
        if (activeCall) {
            activeCall.hangup();
            return;
        }

        const token = document.getElementById('tokenInput').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnCall');

        if (!token) {
            alert("Por favor, ingresa el Access Token.");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Inicializando servicios...";

            // Lógica idéntica al repo oficial:
            webex = Webex.init({
                credentials: { access_token: token },
                config: {
                    phone: {
                        enablePhoneService: true,
                        enableWebRTC: true,
                        calling: { enabled: true } // El scope de 'calls' que mencionamos
                    }
                }
            });

            status.innerText = "Registrando dispositivo...";
            await webex.internal.device.register();

            status.innerText = "Conectando línea de voz...";
            // Forzamos la espera del servicio antes del registro de línea
            await webex.phone.register();

            status.innerText = "Marcando al 6100...";
            // Llamada asíncrona como en la demo
            activeCall = await webex.phone.dial('6100');

            activeCall.on('connected', () => {
                status.innerText = "🟢 EN LLAMADA (6100)";
                btn.innerText = "COLGAR LLAMADA";
                btn.style.background = "#d9534f"; // Rojo
                btn.disabled = false;
            });

            activeCall.on('disconnected', () => {
                status.innerText = "Llamada terminada";
                resetUI();
            });

            activeCall.on('error', (err) => {
                console.error(err);
                status.innerText = "Error: " + err.message;
                resetUI();
            });

        } catch (error) {
            console.error("Fallo:", error);
            status.innerText = "Fallo en conexión: " + error.message;
            btn.disabled = false;
        }
    }

    function resetUI() {
        const btn = document.getElementById('btnCall');
        activeCall = null;
        btn.innerText = "LLAMAR AL 6100";
        btn.style.background = "#3278a0";
        btn.disabled = false;
    }
</script>

</body>
</html>
