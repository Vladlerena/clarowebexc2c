<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex Calling Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #050d1a; color: #00d4ff; font-family: 'Share Tech Mono', monospace; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; border: 1px solid #1a3a6e; padding: 20px; border-radius: 10px; background: #0a1628; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #1a3a6e; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #00d4ff; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #333; color: #666; }
        #log { font-size: 11px; background: #000; height: 150px; overflow-y: auto; padding: 10px; margin-top: 15px; border: 1px solid #1a3a6e; color: #4a6fa5; }
        .log-ok { color: #00ff88; }
        .log-error { color: #ff3b6b; }
    </style>
</head>
<body>

<div class="container">
    <h3>WEBEX C2C v1.2</h3>
    <p style="font-size: 10px;">Status: <span id="lib-status">Cargando motor...</span></p>
    
    <input type="password" id="token" placeholder="Token OAuth">
    <input type="text" id="sip" placeholder="usuario@empresa.webex.com">
    <input type="text" id="destino" placeholder="Número destino">
    
    <button id="btnConnect" disabled onclick="conectarSIP()">1. CONECTAR SIP</button>
    <button id="btnCall" disabled onclick="hacerLlamada()">2. LLAMAR</button>
    
    <div id="log"></div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
    // --- CARGA FORZADA DE LIBRERÍA ---
    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jssip/3.10.0/jssip.min.js";
    script.async = true;

    script.onload = () => {
        imprimir("✓ Motor JsSIP cargado correctamente", "ok");
        document.getElementById('lib-status').innerText = "LISTO";
        document.getElementById('btnConnect').disabled = false;
    };

    script.onerror = () => {
        imprimir("✗ Error crítico cargando motor SIP", "error");
    };

    document.head.appendChild(script);

    let ua = null;
    let call = null;

    function imprimir(msg, clase = "") {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.className = clase === "ok" ? "log-ok" : (clase === "error" ? "log-error" : "");
        d.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    }

    function conectarSIP() {
        const token = document.getElementById('token').value;
        const sipUri = document.getElementById('sip').value;

        if (!token || !sipUri) return imprimir("Faltan datos", "error");

        try {
            const socket = new JsSIP.WebSocketInterface('wss://sip2sip.webex.com:8443/sip');
            ua = new JsSIP.UA({
                sockets: [socket],
                uri: `sip:${sipUri}`,
                password: token,
                register: true
            });

            ua.on('registered', () => {
                imprimir("✓ Registrado en Webex Calling", "ok");
                document.getElementById('btnCall').disabled = false;
            });

            ua.on('registrationFailed', (e) => {
                imprimir("✗ Registro fallido: " + e.cause, "error");
            });

            ua.start();
        } catch (e) {
            imprimir("Error: " + e.message, "error");
        }
    }

    function hacerLlamada() {
        const target = document.getElementById('destino').value;
        if (!target) return;

        imprimir(`Llamando a ${target}...`);
        
        const options = {
            mediaConstraints: { audio: true, video: false },
            pcConfig: { iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }] }
        };

        call = ua.call(`sip:${target}`, options);

        call.on('confirmed', () => imprimir("Llamada en curso", "ok"));
        call.on('ended', () => imprimir("Llamada finalizada"));
        call.on('failed', (e) => imprimir("Falló: " + e.cause, "error"));

        call.connection.addEventListener('track', (e) => {
            if (e.streams[0]) document.getElementById('remoteAudio').srcObject = e.streams[0];
        });
    }
</script>

</body>
</html>
