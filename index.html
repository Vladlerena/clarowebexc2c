<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Click to Call - Claro</title>
   <script src="webex-calling-sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eee; }
        .card { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        .btn { background: #ef3829; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/Logo_Claro_AMX.svg" width="80" alt="Claro">
        <h3>Soporte Técnico</h3>
        <button id="callBtn" class="btn" disabled>Cargando SDK...</button>
        <div id="status">Iniciando servicio...</div>
    </div>

    <script>
        // REEMPLAZA ESTOS VALORES
        const TOKEN = 'NmZhM2FiNTYtNzY0YS00Y2Q0LThhMjUtMmRlODljNGI1Njg0MjcyMWRlZDMtZjYx_P0A1_cbbe27d4-1f60-43cb-819b-fd3749c66621'; 
        const DESTINO = '856100';

        let client;

        async function start() {
            try {
                client = new WebexCalling.CallingClient({ token: TOKEN });
                await client.register();
                
                document.getElementById('callBtn').disabled = false;
                document.getElementById('callBtn').innerText = 'Llamar a Claro';
                document.getElementById('status').innerText = 'Conectado y listo';
            } catch (e) {
                document.getElementById('status').innerText = 'Error: Revisa el Token o HTTPS';
                console.error(e);
            }
        }

        document.getElementById('callBtn').onclick = async () => {
            try {
                const call = await client.makeCall(DESTINO);
                document.getElementById('status').innerText = 'Llamando...';
                call.on('connected', () => document.getElementById('status').innerText = 'En línea');
            } catch (e) {
                alert('Error al llamar: ' + e.message);
            }
        };

        start();
    </script>
</body>
</html>
