<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConnectNow | Webex Calling</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jssip/3.10.0/jssip.min.js" crossorigin="anonymous"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --bg: #050d1a; --surface: #0a1628; --border: #1a3a6e;
      --accent: #00d4ff; --green: #00ff88; --red: #ff3b6b;
      --text: #c8e0ff; --text-dim: #4a6fa5;
      --mono: 'Share Tech Mono', monospace; --sans: 'Exo 2', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    .page { width: 100%; max-width: 500px; padding: 40px 20px; display: flex; flex-direction: column; gap: 25px; z-index: 1; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .section-label { font-family: var(--mono); font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; }
    input {
      width: 100%; background: #020810; border: 1px solid var(--border); border-radius: 8px;
      color: #fff; font-family: var(--mono); padding: 10px; margin-bottom: 10px; outline: none;
    }
    input:focus { border-color: var(--accent); }
    .status-text { font-family: var(--mono); font-size: 11px; }
    .status-text.ok { color: var(--green); }
    .status-text.error { color: var(--red); }
    
    .call-btn {
      width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--green);
      background: rgba(0, 255, 136, 0.1); color: var(--green); cursor: pointer;
      font-family: var(--mono); font-weight: bold; transition: all 0.3s;
    }
    .call-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .call-btn.in-call { border-color: var(--red); color: var(--red); background: rgba(255, 59, 107, 0.1); }

    .debug-log {
      background: #000; border: 1px solid #111; padding: 10px; height: 150px;
      overflow-y: auto; font-family: var(--mono); font-size: 10px; line-height: 1.4;
    }
    .log-info { color: var(--text-dim); }
    .log-ok { color: var(--green); }
    .log-error { color: var(--red); }
  </style>
</head>
<body>

<div class="page">
  <header style="text-align: center;">
    <h2 style="letter-spacing: 2px;">CONNECT NOW</h2>
    <p style="font-size: 10px; color: var(--text-dim);">WEBEX CALLING ENGINE</p>
  </header>

  <div class="card">
    <div class="section-label">// Credenciales</div>
    <input type="password" id="tokenInput" placeholder="Webex Access Token">
    <input type="text" id="sipUser" placeholder="tu-usuario@empresa.webex.com">
    <input type="text" id="destInput" placeholder="Destino (ej: +5411...)">
    <div id="statusMsg" class="status-text">Verificando librería...</div>
  </div>

  <div class="card" style="text-align: center;">
    <div style="font-size: 24px; margin-bottom: 15px;" id="destDisplay">—</div>
    <button class="call-btn" id="callBtn" disabled onclick="toggleCall()">LLAMAR</button>
    <div id="timer" style="margin-top: 10px; font-family: var(--mono); color: var(--text-dim);">00:00</div>
  </div>

  <div class="card">
    <div class="section-label" style="color:orange">// Debug Console</div>
    <div class="debug-log" id="debugLog"></div>
    <button onclick="initWebex()" id="connectBtn" disabled style="width:100%; margin-top:10px; padding:8px; font-family:var(--mono); cursor:pointer;">⚡ CONECTAR SIP</button>
  </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
  let ua = null;
  let currentCall = null;
  let isRegistered = false;

  function log(msg, type = 'info') {
    const logDiv = document.getElementById('debugLog');
    const line = document.createElement('div');
    line.className = `log-${type}`;
    line.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(line);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // ── SISTEMA DE REINTENTOS PARA JSSIP ──
  function initApp(retries = 10) {
    const status = document.getElementById('statusMsg');
    
    if (typeof JsSIP !== 'undefined') {
      log('✓ JsSIP cargado exitosamente.', 'ok');
      status.innerText = 'Librería lista. Ingresa datos.';
      status.className = 'status-text ok';
      document.getElementById('connectBtn').disabled = false;
      return;
    }

    if (retries > 0) {
      log(`Esperando JsSIP... (${retries})`, 'info');
      setTimeout(() => initApp(retries - 1), 1000);
    } else {
      log('✗ Error: No se pudo cargar JsSIP. Revisa tu conexión.', 'error');
      status.innerText = 'Error al cargar librería SIP.';
      status.className = 'status-text error';
    }
  }

  // ── INICIALIZACIÓN AL CARGAR ──
  window.onload = () => {
    initApp();
    document.getElementById('destInput').addEventListener('input', (e) => {
      document.getElementById('destDisplay').innerText = e.target.value || '—';
    });
  };

  async function initWebex() {
    const token = document.getElementById('tokenInput').value.trim();
    const sip = document.getElementById('sipUser').value.trim();

    if (!token || !sip) {
      log('Faltan datos obligatorios.', 'error');
      return;
    }

    try {
      log('Conectando a WSS: sip2sip.webex.com...', 'info');
      const socket = new JsSIP.WebSocketInterface('wss://sip2sip.webex.com:8443/sip');
      
      ua = new JsSIP.UA({
        sockets: [socket],
        uri: `sip:${sip}`,
        password: token, // Webex Calling usa el Token como password SIP
        register: true
      });

      ua.on('registered', () => {
        log('✓ Registrado en la nube de Webex.', 'ok');
        isRegistered = true;
        document.getElementById('callBtn').disabled = false;
        document.getElementById('statusMsg').innerText = 'Online - Listo para llamar';
      });

      ua.on('registrationFailed', (e) => {
        log('✗ Error de registro: ' + e.cause, 'error');
        isRegistered = false;
      });

      ua.start();
    } catch (e) {
      log('Error de inicio: ' + e.message, 'error');
    }
  }

  function toggleCall() {
    if (!currentCall) {
      const dest = document.getElementById('destInput').value.trim();
      log(`Llamando a: ${dest}...`, 'info');
      
      const options = {
        mediaConstraints: { audio: true, video: false },
        rtcOfferConstraints: { offerToReceiveAudio: true, offerToReceiveVideo: false }
      };

      currentCall = ua.call(`sip:${dest}`, options);

      currentCall.on('confirmed', () => {
        log('Llamada establecida.', 'ok');
        document.getElementById('callBtn').innerText = 'COLGAR';
        document.getElementById('callBtn').classList.add('in-call');
      });

      currentCall.on('ended', () => {
        log('Llamada finalizada.', 'info');
        resetCallUI();
      });

      currentCall.on('failed', (e) => {
        log('Llamada fallida: ' + e.cause, 'error');
        resetCallUI();
      });

      // Vinculación de Audio
      currentCall.connection.addEventListener('track', (e) => {
        if (e.streams[0]) {
          document.getElementById('remoteAudio').srcObject = e.streams[0];
        }
      });

    } else {
      currentCall.terminate();
    }
  }

  function resetCallUI() {
    currentCall = null;
    document.getElementById('callBtn').innerText = 'LLAMAR';
    document.getElementById('callBtn').classList.remove('in-call');
  }
</script>

</body>
</html>
