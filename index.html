<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Webex Calling Direct</title>
    <script src="https://unpkg.com/webex@^1/umd/webex.min.js"></script>
</head>
<body>
    <div style="text-align:center; margin-top:50px;">
        <button id="callBtn" onclick="iniciar()" style="padding:20px; cursor:pointer;">
            INICIAR LLAMADA
        </button>
        <p id="status">Estado: Esperando...</p>
    </div>

    <script>
        // Esta es la lógica que normalmente iría en el archivo .js separado
        async function iniciar() {
            const token = "TU_TOKEN_AQUI";
            const destino = "NUMERO_DESTINO"; // ej: +5411...
            const status = document.getElementById('status');

            try {
                status.innerText = "Registrando en Webex...";
                
                // Inicializamos el objeto global que trae el SDK
                const webex = Webex.init({
                    credentials: { access_token: token }
                });

                // Estos pasos sustituyen lo que hace el archivo .js de Cisco
                await webex.internal.device.register();
                await webex.phone.register();

                status.innerText = "Llamando...";
                const call = webex.phone.dial(destino);

                call.on('connected', () => status.innerText = "¡CONECTADO!");
                call.on('disconnected', () => status.innerText = "Llamada finalizada");
                
            } catch (error) {
                status.innerText = "Error: " + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
