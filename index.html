<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex Calling - Anexo 6100</title>
    
    <script src="webex.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f4f8;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .card {
            background: white; padding: 40px; border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%; max-width: 380px; text-align: center;
        }
        h2 { color: #1a1a1b; margin-bottom: 10px; font-size: 22px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 25px; }
        
        .status-box {
            background: #f9fafb; border: 1px solid #e5e7eb;
            padding: 12px; border-radius: 8px; margin-bottom: 20px;
            font-size: 13px; color: #374151; min-height: 20px;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #d1d5db; border-radius: 8px;
            box-sizing: border-box; font-size: 14px;
        }

        .btn-call {
            width: 100%; padding: 15px;
            background-color: #3278a0; color: white;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-call:hover { background-color: #265d7d; }
        .btn-call:disabled { background-color: #9ca3af; cursor: not-allowed; }

        .oauth-link {
            display: block; margin-top: 20px;
            font-size: 13px; color: #2563eb; text-decoration: none;
            font-weight: 500;
        }
        .oauth-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Anexo AA 6100</h2>
        <p>Click-to-Call System</p>
        
        <div id="status" class="status-box">Estado: Esperando Token...</div>

        <input type="password" id="tokenInput" placeholder="Token se cargará aquí...">
        
        <button id="btnCall" onclick="gestionarAccion()" class="btn-call">LLAMAR AL 6100</button>
        
        <a href="https://webexapis.com/v1/authorize?client_id=C6b8299f6b12f82cec3482504e820982d6f501b66a0290d70868b782f942368c2&response_type=code&redirect_uri=https%3A%2F%2Fvladlerena.github.io%2F&scope=spark%3Akms%20spark%3Apeople_read%20spark%3Awebrtc_calling&state=set_state_here">
            🔑 Autorizar cuenta Webex
        </a>
    </div>

    <script>
        let webex;
        let activeCall;

        // --- 1. DETECTOR AUTOMÁTICO DE TOKEN (OAuth Receptor) ---
        window.onload = () => {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                const params = new URLSearchParams(hash.replace('#', '?'));
                const token = params.get('access_token');
                if (token) {
                    document.getElementById('tokenInput').value = token;
                    document.getElementById('status').innerText = "✅ Token obtenido correctamente.";
                    // Limpiamos la URL para seguridad
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        };

        // --- 2. LÓGICA DE LLAMADA ---
        async function gestionarAccion() {
            if (activeCall) {
                activeCall.hangup();
                return;
            }

            const token = document.getElementById('tokenInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnCall');

            if (!token) {
                alert("Primero haz clic en 'Autorizar cuenta Webex'");
                return;
            }

            try {
                btn.disabled = true;
                status.innerText = "🔄 Inicializando SDK...";

                webex = Webex.init({
                    credentials: { access_token: token },
                    config: {
                        phone: {
                            enablePhoneService: true,
                            preferredDevice: 'BROWSER'
                        }
                    }
                });

                status.innerText = "🔄 Registrando dispositivo...";
                await webex.internal.device.register();

                status.innerText = "🔄 Conectando voz...";
                await webex.phone.register();

                status.innerText = "📞 Marcando al 6100...";
                activeCall = webex.phone.dial('6100');

                activeCall.on('connected', () => {
                    status.innerText = "🟢 EN LLAMADA CON AA 6100";
                    btn.innerText = "COLGAR";
                    btn.style.backgroundColor = "#dc2626";
                    btn.disabled = false;
                });

                activeCall.on('disconnected', () => {
                    status.innerText = "⚪ Llamada finalizada";
                    resetUI();
                });

                activeCall.on('error', (err) => {
                    console.error(err);
                    status.innerText = "❌ Error: " + err.message;
                    resetUI();
                });

            } catch (error) {
                console.error(error);
                status.innerText = "❌ Error: " + (error.message || "No autorizado");
                btn.disabled = false;
            }
        }

        function resetUI() {
            const btn = document.getElementById('btnCall');
            activeCall = null;
            btn.innerText = "LLAMAR AL 6100";
            btn.style.backgroundColor = "#3278a0";
            btn.disabled = false;
        }
    </script>
</body>
</html>
