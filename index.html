<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex Calling - Anexo 6100</title>
    
    <script src="webex.min.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8faff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #121212; font-size: 24px; margin-bottom: 30px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        button {
            width: 100%; padding: 14px;
            background-color: #3278a0; color: white;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; color: #4b5563; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Anexo AA 6100</h2>
        <input type="password" id="tokenInput" placeholder="Pega tu Access Token aquí">
        <button id="btnCall" onclick="gestionarLlamada()">LLAMAR AL 6100</button>
        <div id="status">Estado: Desconectado</div>
    </div>

    <script>
        let webex;
        let activeCall;

        async function gestionarLlamada() {
            // Si ya hay una llamada, el botón funciona para colgar
            if (activeCall) {
                finalizarLlamada();
                return;
            }

            const token = document.getElementById('tokenInput').value.trim();
            const status = document.getElementById('status');
            const btn = document.getElementById('btnCall');

            if (!token) {
                alert("Por favor, ingresa tu Access Token.");
                return;
            }

            try {
                btn.disabled = true;
                status.innerText = "Estado: Inicializando SDK...";

                // --- INICIALIZACIÓN CON FORZADO DE SERVICIO DE TELÉFONO ---
                webex = Webex.init({
                    credentials: { access_token: token },
                    config: {
                        phone: {
                            enablePhoneService: true, // Esto activa el módulo 'phone'
                            preferredDevice: 'BROWSER'
                        }
                    }
                });

                // Validamos que el SDK cargó los módulos antes de registrar
                if (!webex.internal || !webex.internal.device) {
                    throw new Error("El módulo interno no está listo. Revisa tu Token.");
                }

                status.innerText = "Estado: Registrando dispositivo...";
                await webex.internal.device.register();

                status.innerText = "Estado: Conectando servicio de voz...";
                if (!webex.phone) {
                    throw new Error("El servicio de llamadas no está disponible en este Token.");
                }
                
                await webex.phone.register();

                status.innerText = "Estado: Marcando al 6100...";
                activeCall = webex.phone.dial('6100');

                // Eventos de la llamada
                activeCall.on('connected', () => {
                    status.innerText = "Estado: ¡CONECTADO AL 6100!";
                    btn.innerText = "FINALIZAR LLAMADA";
                    btn.style.backgroundColor = "#e11d48"; // Rojo
                    btn.disabled = false;
                });

                activeCall.on('disconnected', () => {
                    status.innerText = "Estado: Llamada finalizada";
                    resetUI();
                });

                activeCall.on('error', (err) => {
                    console.error("Error en llamada:", err);
                    status.innerText = "Error: " + err.message;
                    resetUI();
                });

            } catch (error) {
                console.error("Error General:", error);
                status.innerText = "Error: " + error.message;
                btn.disabled = false;
                alert("Hubo un problema: " + error.message);
            }
        }

        function finalizarLlamada() {
            if (activeCall) {
                activeCall.hangup();
            }
        }

        function resetUI() {
            const btn = document.getElementById('btnCall');
            activeCall = null;
            btn.innerText = "LLAMAR AL 6100";
            btn.style.backgroundColor = "#3278a0";
            btn.disabled = false;
        }
    </script>
</body>
</html>
